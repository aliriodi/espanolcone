<!DOCTYPE html>
        <html>
            <head>
                <style>
                    *{
                        font-family: 'Montserrat', sans-serif;
                        color: #6E6B7B;
                    }

                    body {
                    /* background-color: #f4f4f4; */
                    margin: 0;
                    padding: 0;
                    }

                    .container{
                    background-color: #fff
                    }

                    header {
                    padding: 25px;
                    text-align: center;
                    border-radius: 0 0 60px;
                    /*border-radius: 0 0 60% 60%;*/
                    position: relative;
                    }
                    header img{
                    width: 123px;
                    height: 78.25px;
                    margin-bottom: 15px;
                    position: relative;
                    z-index: 90;
                    }
                    header h1{
                        text-align: center;
                        display: flex;
                        line-height: 48.76px;
                        justify-content: center;
                        align-items: center;
                        font-size: 40px;
                        font-weight: 600;
                        flex-direction: column;
                        color: #555555;
                    }

                    header h1::after{
                    content: '';
                    margin-top: 15px;
                    background-color: #33bb99;
                    height: 2px;
                    width:80.8px;
                    }

                    .main {   
                    text-align: center;
                    padding: 25px;
                    font-weight: 500;
                    }
                    .main p{
                        margin: 0;
                    }
                    .main .mt{
                        margin-top: 12px;
                    }

                    footer {
                    color: #fff;
                    padding: 10px;
                    font-weight: 500;
                    text-align: center;
                    }

                    .ellipse-1{
                        width: 100px;
                        height: 100px;
                        border: #8438ff solid 30px;
                        position: absolute;
                        left: -40px;
                        /* bottom: 0; */
                        border-radius: 100%;
                    }
                    
                    .ellipse-2{
                        width: 100px;
                        height: 100px;
                        background-color: #ff7438;
                        position: absolute;
                        border-radius: 100%;
                        top: 50px;
                        right: -30px;
                    }
                </style>
            </head>
            <body>

            <div class="container">

                <header>

                    <img src="https://espanolcone-five.vercel.app/_next/image?url=https%3A%2F%2Fres.cloudinary.com%2Fdfddh08q8%2Fimage%2Fupload%2Fs--4NefY4Ug--%2Fv1701173990%2Fimages%2Fl9hxqqm6urwlk6x8qdih.png&w=384&q=75"/>
                    
                    <h1 style=" z-index: 90;">${title}</h1>

                </header>
                
                <div class="main" style="flex-direction: column; align-items: center; font-size: 18px;">
                    ${}
                </div>
                
                <footer style="font-size: 18px;">
                    
                </footer>


                <span class="ellipse-1"></span>
                <span class="ellipse-2"></span>
            </div>
            </body>
        </html>
